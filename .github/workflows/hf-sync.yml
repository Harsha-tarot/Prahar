name: Sync Backend → HuggingFace Spaces

on:
  push:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push backend to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: prahar-backend
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git subtree push --prefix=backend \
            https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME \
            main
